[tools]
rust = { version = "1.94.0", profile = "default" }
node = "lts"
pnpm = "latest"
lefthook = "latest"

[hooks]
postinstall = "lefthook install"

[tasks]
# 開發常用指令
dev = { run = "pnpm tauri dev", description = "Start dev server" }
test = { run = "cd src-tauri && cargo test --lib", description = "Run Rust tests" }
check = { run = "cd src-tauri && cargo check", description = "Check compilation" }
fmt = { run = "cd src-tauri && cargo fmt", description = "Format Rust code" }
clippy = { run = "cd src-tauri && cargo clippy -- -D warnings", description = "Run clippy lints" }

# 建置
build = { run = "pnpm tauri build", description = "Build NSIS installer + release exe" }
build-frontend = { run = "pnpm build", description = "Build frontend only" }
build-rust = { run = "cd src-tauri && cargo build --release", description = "Build Rust only" }

# 清理
clean = { run = "cd src-tauri && cargo clean && rm -rf dist", description = "Clean build artifacts" }

# 完整驗證（前端 + Rust 測試）
verify = { depends = ["build-frontend", "test"], description = "Build frontend and run tests" }
