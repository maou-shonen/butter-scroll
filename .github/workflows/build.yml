name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Linux 測試與檢查
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Remove custom linker config for Linux CI (uses system linker)
      - name: Setup cargo config
        run: rm -f .cargo/config.toml

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings -A dead_code

  # Windows 編譯（產出 .exe）
  build-windows:
    runs-on: windows-latest
    needs: test-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: butter-scroll-windows
          path: target/release/butter-scroll.exe

  # 發布 Release（只在推 tag 時執行）
  release:
    runs-on: windows-latest
    needs: [test-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target/release/butter-scroll.exe release/
          Copy-Item config.default.toml release/config.toml
          Compress-Archive -Path release/* -DestinationPath butter-scroll-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: butter-scroll-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
