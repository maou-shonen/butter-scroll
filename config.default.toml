[scroll]
frame_rate = 150
animation_time = 400
step_size = 100.0
pulse_algorithm = true
pulse_scale = 4.0
pulse_normalize = 1.0
inverted = false

[acceleration]
delta_ms = 50
max = 3.0

[output]
# Minimum accumulated delta before injecting a wheel event.
# Lower = smoother scrolling, higher = more compatible with legacy apps.
# 120 = WHEEL_DELTA (chunkiest, universal compatibility)
# 40 = WHEEL_DELTA/3 (recommended balance)
# 1 = per-frame injection (smoothest, modern apps only)
inject_threshold = 40.0

[general]
autostart = false
enabled = true
